<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<nav th:fragment="navbar"
     class="bg-white fixed w-full z-50 top-0 left-0 border-b border-gray-200">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">

            <!-- Logo -->
            <a th:href="@{/}" class="flex items-center gap-3">
                <img th:src="@{/images/phone.png}" class="h-8 w-8" alt="Logo">
                <span class="text-xl font-bold text-gray-900">
                    PhoneLink
                </span>
            </a>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center gap-8">
                <a th:href="@{/}" class="text-sm font-semibold text-gray-700 hover:text-blue-600 transition">
                    Home
                </a>
                <a th:href="@{/about}" class="text-sm font-semibold text-gray-700 hover:text-blue-600 transition">
                    About
                </a>
                <a th:href="@{/service}" class="text-sm font-semibold text-gray-700 hover:text-blue-600 transition">
                    Services
                </a>
                <a th:href="@{/contact}" class="text-sm font-semibold text-gray-700 hover:text-blue-600 transition">
                    Contact Us
                </a>
            </div>

            <!-- Buttons -->
            <div class="hidden md:flex items-center gap-3">
                <a th:href="@{/login}"
                   class="px-4 py-2 rounded-lg text-sm font-semibold
                          text-gray-800 bg-gray-100 hover:bg-gray-200 transition">
                    Login
                </a>

                <a th:href="@{/signup}"
                   class="px-4 py-2 rounded-lg text-sm font-semibold
                          text-white bg-blue-600 hover:bg-blue-700 transition">
                    Sign Up
                </a>
            </div>

            <!-- Mobile Menu Button -->
            <button class="md:hidden p-2 rounded-lg hover:bg-gray-100 transition"
                    data-collapse-toggle="navbar-sticky">
                <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" stroke-width="2"
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>

        </div>

        <!-- Mobile Menu -->
        <div class="hidden md:hidden pb-4" id="navbar-sticky">
            <div class="flex flex-col gap-2 pt-2">
                <a th:href="@{/}" class="py-2 text-gray-700 font-semibold hover:text-blue-600">Home</a>
                <a th:href="@{/about}" class="py-2 text-gray-700 font-semibold hover:text-blue-600">About</a>
                <a th:href="@{/service}" class="py-2 text-gray-700 font-semibold hover:text-blue-600">Services</a>
                <a th:href="@{/contact}" class="py-2 text-gray-700 font-semibold hover:text-blue-600">Contact</a>

                <div class="flex gap-3 pt-3">
                    <a th:href="@{/login}"
                       class="w-full text-center px-4 py-2 rounded-lg text-sm font-semibold
                              text-gray-800 bg-gray-100 hover:bg-gray-200 transition">
                        Login
                    </a>
                    <a th:href="@{/signup}"
                       class="w-full text-center px-4 py-2 rounded-lg text-sm font-semibold
                              text-white bg-blue-600 hover:bg-blue-700 transition">
                        Sign Up
                    </a>
                </div>
            </div>
        </div>

    </div>
</nav>

</html>
