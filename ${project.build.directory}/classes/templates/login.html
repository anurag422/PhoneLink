<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login | PhoneLink</title>
</head>

<body>

<div layout:fragment="content"
     class="relative min-h-[calc(100vh-4.25rem)] flex items-center justify-center px-4 py-10">

    <!-- Background -->
    <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950"></div>
    <div class="absolute inset-0 opacity-30 bg-[radial-gradient(circle_at_30%_20%,rgba(99,102,241,0.35),transparent_40%),radial-gradient(circle_at_80%_70%,rgba(59,130,246,0.25),transparent_45%)]"></div>

    <!-- Card -->
    <div class="relative w-full max-w-md">
        <div class="bg-white/10 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-7">

            <!-- Header -->
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-white tracking-tight">
                    Welcome back 👋
                </h1>
                <p class="text-sm text-slate-300 mt-1">
                    Login to continue using <span class="font-semibold text-indigo-300">PhoneLink</span>
                </p>
            </div>

            <!-- Messages -->
            <div th:replace="~{message :: message}"></div>

            <div class="text-red-300 text-sm mb-3" th:if="${param.error}">
                Invalid email or password.
            </div>

            <div class="text-green-300 text-sm mb-3" th:if="${param.logout}">
                Logged out successfully.
            </div>

            <!-- Form -->
            <form method="post"
                  th:action="@{/authenticated}"
                  class="space-y-4"
                  novalidate>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-slate-200 mb-2" for="email">
                        Email
                    </label>
                    <input type="email"
                           name="email"
                           id="email"
                           class="w-full px-4 py-3 text-sm text-white placeholder:text-slate-400
                                  bg-white/5 border border-white/10 rounded-xl
                                  focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
                                  outline-none transition"
                           placeholder="Enter Email"
                           required>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-slate-200 mb-2" for="password">
                        Password
                    </label>
                    <input type="password"
                           id="password"
                           name="password"
                           class="w-full px-4 py-3 text-sm text-white placeholder:text-slate-400
                                  bg-white/5 border border-white/10 rounded-xl
                                  focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
                                  outline-none transition"
                           placeholder="••••••••"
                           required>
                </div>

                <!-- Forgot Password -->
                <div class="flex items-center justify-between">
                    <a th:href="@{/auth/forget_password}"
                       class="text-sm text-indigo-300 hover:text-indigo-200 underline underline-offset-4">
                        Forgot password?
                    </a>
                </div>

                <!-- Buttons -->
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button type="submit"
                            class="w-full py-3 text-sm font-semibold
                                   text-white bg-indigo-600 rounded-xl
                                   hover:bg-indigo-700
                                   focus:ring-4 focus:ring-indigo-300/30
                                   transition">
                        Login
                    </button>

                    <button type="reset"
                            class="w-full py-3 text-sm font-semibold
                                   text-slate-200 bg-white/10 rounded-xl
                                   hover:bg-white/20
                                   focus:ring-4 focus:ring-white/10
                                   transition">
                        Reset
                    </button>
                </div>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-6">
                <div class="h-px w-full bg-white/10"></div>
                <span class="text-xs text-slate-400">OR</span>
                <div class="h-px w-full bg-white/10"></div>
            </div>

            <!-- Social Login -->
            <div class="flex flex-col gap-3">

                <!-- Google -->
                <a th:href="@{/oauth2/authorization/google}"
                   class="inline-flex items-center justify-center gap-3 px-4 py-3 rounded-xl
                          bg-white text-slate-800 font-semibold text-sm
                          hover:bg-slate-100 transition">
                    <svg class="w-5 h-5" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                              d="M24 9.5c3.1 0 5.9 1.1 8.1 2.9l6-6C34.5 2.5 29.6 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.3 5.7C11.8 13.4 17.4 9.5 24 9.5z"/>
                        <path fill="#4285F4"
                              d="M46.1 24.5c0-1.6-.1-2.8-.4-4H24v7.6h12.7c-.6 3-2.3 5.5-4.9 7.2l7.6 5.9C43.9 37 46.1 31.3 46.1 24.5z"/>
                        <path fill="#FBBC05"
                              d="M9.8 28.6c-.5-1.4-.8-2.9-.8-4.6s.3-3.2.8-4.6L2.5 13.3C.9 16.4 0 20 0 24s.9 7.6 2.5 10.7l7.3-6.1z"/>
                        <path fill="#34A853"
                              d="M24 48c6.5 0 12-2.1 16-5.7l-7.6-5.9c-2.1 1.4-4.8 2.2-8.4 2.2-6.6 0-12.2-3.9-14.2-9.5l-7.3 6.1C6.4 42.6 14.6 48 24 48z"/>
                    </svg>
                    Continue with Google
                </a>

                <!-- GitHub -->
                <a th:href="@{/oauth2/authorization/github}"
                   class="inline-flex items-center justify-center gap-3 px-4 py-3 rounded-xl
                          bg-slate-900 text-white font-semibold text-sm
                          hover:bg-slate-800 transition">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24" aria-hidden="true">
                        <path
                                d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.02c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.35-1.76-1.35-1.76-1.1-.75.09-.74.09-.74 1.22.09 1.86 1.25 1.86 1.25 1.08 1.85 2.83 1.32 3.52 1.01.11-.78.42-1.32.76-1.62-2.67-.3-5.47-1.34-5.47-5.96 0-1.32.47-2.39 1.24-3.23-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23.96-.27 1.99-.41 3.01-.41s2.05.14 3.01.41c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.23 0 4.63-2.8 5.66-5.48 5.96.43.37.82 1.1.82 2.22v3.29c0 .32.22.69.83.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                    Continue with GitHub
                </a>

            </div>

            <!-- Footer -->
            <p class="text-center text-sm text-slate-300 mt-6">
                Don’t have an account?
                <a th:href="@{/signup}"
                   class="text-indigo-300 font-semibold hover:text-indigo-200 underline underline-offset-4">
                    Create one
                </a>
            </p>

        </div>
    </div>

</div>

</body>
</html>
