<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>message</title>
</head>
<body>
      <div th:if="${session.message}" th:fragment="message" th:object="${session.message}" >
          <div class="flex items-start sm:items-center p-4 mb-4 text-sm"
               th:classappend="*{'text-'+type+'-700 bg-'+type+'-100
            border border-'+type+'-300
            rounded-lg'}"
               role="alert">

              <svg class="w-4 h-4 mr-2 mt-0.5 sm:mt-0 flex-shrink-0 text-green-700"
                   aria-hidden="true"
                   xmlns="http://www.w3.org/2000/svg"
                   fill="none"
                   viewBox="0 0 24 24"
                   stroke="currentColor">
                  <path stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
              </svg>

              <p>
                  <span th:text="*{content}"></span>
              </p>

              <th:block th:text="${@sessionHelper.removeMessage()}"></th:block>
          </div>

      </div>
</body>
</html>
