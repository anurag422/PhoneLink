<nav th:fragment="user_navbar"
     xmlns:th="http://www.thymeleaf.org"
     class="bg-white fixed w-full z-50 top-0 sm:pl-64 start-0 border-b border-gray-200">

    <div class="max-w-7xl flex flex-wrap items-center justify-between mx-auto px-4 py-3">

        <!-- Sidebar Toggle (Mobile) -->
        <button data-drawer-target="logo-sidebar"
                data-drawer-toggle="logo-sidebar"
                aria-controls="logo-sidebar"
                type="button"
                class="inline-flex items-center justify-center sm:hidden
                       w-10 h-10 rounded-lg
                       bg-gray-100 hover:bg-gray-200 transition">

            <span class="sr-only">Open sidebar</span>
            <svg class="w-6 h-6 text-gray-800" aria-hidden="true"
                 xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-width="2"
                      d="M5 7h14M5 12h14M5 17h10"/>
            </svg>
        </button>

        <!-- Logo -->
        <a th:href="@{/}" class="flex items-center gap-3">
            <img th:src="@{/images/phone.png}" class="h-8 w-8" alt="Logo">
            <span class="text-lg font-bold text-gray-900">
                PhoneLink
            </span>
        </a>

        <!-- Right Buttons -->
        <div class="flex items-center gap-3 md:order-2">

            <!-- User Name -->
            <a th:href="@{/user/dashboard}"
               class="hidden md:inline-flex items-center gap-2
                      px-4 py-2 rounded-lg text-sm font-semibold
                      text-indigo-700 bg-indigo-50
                      hover:bg-indigo-100 transition">
                <i class="fa-solid fa-user text-sm"></i>
                <span th:text="${loggedUser.name}"></span>
            </a>

            <!-- Logout -->
            <a th:href="@{/do-logout}"
               class="hidden md:inline-flex items-center gap-2
                      px-4 py-2 rounded-lg text-sm font-semibold
                      text-white bg-blue-600
                      hover:bg-blue-700 transition">
                <i class="fa-solid fa-right-from-bracket text-sm"></i>
                Logout
            </a>

            <!-- Mobile menu toggle -->
            <button data-collapse-toggle="navbar-sticky"
                    type="button"
                    class="inline-flex items-center justify-center md:hidden
                           w-10 h-10 rounded-lg
                           bg-gray-100 hover:bg-gray-200 transition">
                <span class="sr-only">Open menu</span>
                <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" stroke-width="2"
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>

        </div>

        <!-- Menu -->
        <div class="hidden w-full md:flex md:w-auto md:order-1" id="navbar-sticky">
            <ul class="flex flex-col md:flex-row md:items-center md:gap-8
                       p-4 md:p-0 mt-4 md:mt-0 rounded-lg md:rounded-none
                       bg-gray-50 md:bg-transparent border md:border-0 border-gray-200">

                <li>
                    <a th:href="@{/}"
                       class="block py-2 px-3 rounded-lg md:rounded-none
                              text-gray-800 font-semibold
                              hover:text-blue-600 hover:bg-white md:hover:bg-transparent transition">
                        Home
                    </a>
                </li>

                <li>
                    <a th:href="@{/about}"
                       class="block py-2 px-3 rounded-lg md:rounded-none
                              text-gray-700 font-semibold
                              hover:text-blue-600 hover:bg-white md:hover:bg-transparent transition">
                        About
                    </a>
                </li>

                <li>
                    <a th:href="@{/service}"
                       class="block py-2 px-3 rounded-lg md:rounded-none
                              text-gray-700 font-semibold
                              hover:text-blue-600 hover:bg-white md:hover:bg-transparent transition">
                        Services
                    </a>
                </li>

                <li>
                    <a th:href="@{/contact}"
                       class="block py-2 px-3 rounded-lg md:rounded-none
                              text-gray-700 font-semibold
                              hover:text-blue-600 hover:bg-white md:hover:bg-transparent transition">
                        Contact Us
                    </a>
                </li>

                <!-- Mobile User -->
                <li class="md:hidden">
                    <a th:href="@{/user/profile}"
                       class="block mt-2 px-4 py-3 rounded-lg text-center
                              bg-indigo-600 text-white font-semibold">
                        <i class="fa-solid fa-user mr-2"></i>
                        <span th:text="${loggedUser.name}"></span>
                    </a>
                </li>

                <!-- Mobile Logout -->
                <li class="md:hidden">
                    <a th:href="@{/do-logout}"
                       class="block mt-2 px-4 py-3 rounded-lg text-center
                              bg-blue-600 text-white font-semibold">
                        <i class="fa-solid fa-right-from-bracket mr-2"></i>
                        Logout
                    </a>
                </li>

            </ul>
        </div>

    </div>
</nav>
