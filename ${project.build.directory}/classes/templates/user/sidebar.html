<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<aside
        th:fragment="sidebar"
        id="logo-sidebar"
        class="fixed top-[4.25rem] left-0 z-40 w-64 h-[calc(100vh-4.25rem)]
         transition-transform -translate-x-full sm:translate-x-0"
>


    <div class="h-full px-4 py-4 overflow-y-auto bg-gray-50 border-r border-gray-200">


    <!-- Profile -->
        <div class="flex flex-col items-center text-center pb-5 border-b border-gray-100">

            <img
                    onerror="this.onerror=null; this.src='/images/defaultUser.jpg'"
                    th:src="@{${loggedUser.profilePic}}"
                    class="h-20 w-20 rounded-full object-cover ring-4 ring-indigo-50 shadow-sm"
                    alt="Profile"/>

            <h3 class="mt-3 text-base font-bold text-gray-900"
                th:text="${loggedUser.name}">
                Anurag Prajapat
            </h3>

            <p class="text-xs text-gray-500">
                Welcome to PhoneLink 👋
            </p>

        </div>

        <!-- Menu -->
        <ul class="mt-6 space-y-1 text-sm font-semibold">

            <!-- Dashboard -->
            <li>
                <a th:href="@{/user/dashboard}"
                   class="flex items-center gap-3 px-3 py-2 rounded-lg
                          text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition group">

                    <i class="fa-solid fa-chart-line text-gray-400 group-hover:text-indigo-600"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <!-- Profile -->
            <li>
                <a th:href="@{/user/profile}"
                   class="flex items-center gap-3 px-3 py-2 rounded-lg
                          text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition group">

                    <i class="fa-solid fa-user text-gray-400 group-hover:text-indigo-600"></i>
                    <span class="flex-1">Profile</span>

                    <span class="text-[11px] px-2 py-0.5 rounded-full
                                 bg-indigo-100 text-indigo-700 font-bold">
                        Pro
                    </span>
                </a>
            </li>

            <!-- Add Contact -->
            <li>
                <a th:href="@{/user/contacts/add}"
                   class="flex items-center gap-3 px-3 py-2 rounded-lg
                          text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition group">

                    <i class="fa-solid fa-plus text-gray-400 group-hover:text-indigo-600"></i>
                    <span>Add Contact</span>
                </a>
            </li>

            <!-- Contacts -->
            <li>
                <a th:href="@{/user/contacts}"
                   class="flex items-center gap-3 px-3 py-2 rounded-lg
                          text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition group">

                    <i class="fa-solid fa-address-book text-gray-400 group-hover:text-indigo-600"></i>
                    <span>Contacts</span>
                </a>
            </li>

            <!-- Divider -->
            <li class="pt-3">
                <div class="h-px bg-gray-100"></div>
            </li>

            <!-- Logout -->
            <li>
                <a th:href="@{/do-logout}"
                   class="flex items-center gap-3 px-3 py-2 rounded-lg
                          text-gray-700 hover:bg-red-50 hover:text-red-600 transition group">

                    <i class="fa-solid fa-right-from-bracket text-gray-400 group-hover:text-red-600"></i>
                    <span>Logout</span>
                </a>
            </li>

        </ul>

        <!-- Bottom mini footer -->
        <div class="mt-8 text-xs text-gray-400 text-center">
            © <span th:text="${#dates.format(#dates.createNow(),'yyyy')}">2026</span> PhoneLink
        </div>

    </div>
</aside>

</html>
