<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile | PhoneLink</title>
</head>

<body>

<div layout:fragment="content"
     class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-indigo-50 px-4"
     style="min-height: calc(100vh - 4.25rem);">

    <div class="max-w-4xl mx-auto py-12">

        <!-- PAGE HEADER -->

        <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-8">

            <div>

                <h1 class="mt-3 text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight">
                    Edit Profile
                </h1>

                <p class="mt-2 text-slate-600">
                    Update your personal info and keep your profile clean & professional
                </p>
            </div>

            <div class="flex gap-3">

                <a th:href="@{/user/profile}"
                   class="px-4 py-2 rounded-2xl bg-gray-900 text-white text-sm font-semibold hover:bg-black transition">
                    ← Back
                </a>
            </div>

        </div>


        <!-- MESSAGE -->
        <div th:replace="~{message :: message}"></div>

        <!-- CARD -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- LEFT PREVIEW -->
            <div class="rounded-3xl bg-white/70 backdrop-blur border border-white/60 shadow-xl shadow-slate-200/40 p-7">

                <h3 class="text-lg font-extrabold text-slate-900">
                    Profile Preview
                </h3>

                <div class="mt-6 flex flex-col items-center text-center">

                    <img th:src="@{${loggedUser.profilePic}}"
                         onerror="this.src='/images/defaultUser.jpg'"
                         class="w-28 h-28 rounded-2xl object-cover border border-white shadow"
                         alt="Profile"/>

                    <p class="mt-4 font-extrabold text-slate-900" th:text="${loggedUser.name}">
                        Username
                    </p>

                    <p class="text-sm text-slate-500" th:text="${loggedUser.email}">
                        email@example.com
                    </p>

                    <div class="mt-5 w-full space-y-3 text-sm">
                        <div class="flex items-center justify-between bg-white rounded-2xl border border-gray-200 px-4 py-3">
                            <span class="text-slate-500 font-semibold">Email</span>
                            <span class="font-bold"
                                  th:classappend="${loggedUser.emailVerified ? 'text-green-600' : 'text-red-600'}"
                                  th:text="${loggedUser.emailVerified ? 'Verified' : 'Not Verified'}">
                            </span>
                        </div>

                        <div class="flex items-center justify-between bg-white rounded-2xl border border-gray-200 px-4 py-3">
                            <span class="text-slate-500 font-semibold">Phone</span>
                            <span class="font-bold"
                                  th:classappend="${loggedUser.numberVerified ? 'text-blue-600' : 'text-orange-600'}"
                                  th:text="${loggedUser.numberVerified ? 'Verified' : 'Not Verified'}">
                            </span>
                        </div>
                    </div>

                </div>
            </div>

            <!-- RIGHT FORM -->
            <div class="lg:col-span-2 rounded-3xl bg-white/70 backdrop-blur border border-white/60 shadow-xl shadow-slate-200/40 p-7 sm:p-10">

                <form th:action="@{/edit_profile}"
                      method="post"
                      enctype="multipart/form-data"
                      th:object="${userInfo}"
                      class="space-y-6"
                      novalidate>

                    <!-- TITLE -->
                    <div>
                        <h2 class="text-xl font-extrabold text-slate-900">
                            Update Details
                        </h2>
                        <p class="mt-1 text-sm text-slate-500">
                            Make sure your profile looks good for your contacts.
                        </p>
                    </div>

                    <!-- GRID -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                        <!-- USERNAME -->
                        <div>
                            <label class="block mb-2 text-sm font-bold text-slate-700" for="username">
                                Username
                            </label>
                            <input type="text"
                                   id="username"
                                   th:field="*{name}"
                                   class="w-full px-4 py-3 text-sm
                                          rounded-2xl bg-white
                                          border border-gray-200
                                          shadow-sm
                                          focus:outline-none
                                          focus:ring-2 focus:ring-indigo-500"
                                   placeholder="Enter your name"
                                   required>
                            <p th:if="${#fields.hasErrors('name')}"
                               th:errors="*{name}"
                               class="text-red-600 px-2 pt-2 text-sm"></p>
                        </div>

                        <!-- PHONE -->
                        <div>
                            <label class="block mb-2 text-sm font-bold text-slate-700" for="phone">
                                Contact Number
                            </label>
                            <input type="text"
                                   id="phone"
                                   th:field="*{phoneNumber}"
                                   class="w-full px-4 py-3 text-sm
                                          rounded-2xl bg-white
                                          border border-gray-200
                                          shadow-sm
                                          focus:outline-none
                                          focus:ring-2 focus:ring-indigo-500"
                                   placeholder="Enter phone number"
                                   required>
                            <p th:if="${#fields.hasErrors('phoneNumber')}"
                               th:errors="*{phoneNumber}"
                               class="text-red-600 px-2 pt-2 text-sm"></p>
                        </div>

                    </div>

                    <!-- ABOUT -->
                    <div>
                        <label for="about"
                               class="block mb-2 text-sm font-bold text-slate-700">
                            About
                        </label>

                        <textarea id="about"
                                  rows="5"
                                  th:field="*{about}"
                                  class="w-full p-4 text-sm
                                         rounded-2xl bg-white
                                         border border-gray-200
                                         shadow-sm resize-none
                                         focus:outline-none
                                         focus:ring-2 focus:ring-indigo-500"
                                  placeholder="Write something about yourself..."></textarea>

                        <p th:if="${#fields.hasErrors('about')}"
                           th:errors="*{about}"
                           class="text-red-600 px-2 pt-2 text-sm"></p>
                    </div>

                    <!-- FILE UPLOAD -->
                    <div>
                        <label for="input_file"
                               class="block mb-2 text-sm font-bold text-slate-700">
                            Profile Picture
                        </label>

                        <div class="rounded-2xl border border-dashed border-gray-300 bg-white p-5">
                            <input
                                    id="input_file"
                                    th:field="*{profileImage}"
                                    type="file"
                                    class="block w-full text-sm text-slate-700
                                           file:mr-4 file:py-2.5 file:px-4
                                           file:rounded-xl file:border-0
                                           file:bg-indigo-600 file:text-white file:font-bold
                                           hover:file:bg-indigo-700
                                           cursor-pointer"
                            />

                            <p class="mt-3 text-xs text-slate-500">
                                PNG, JPG allowed. Recommended size: 512x512.
                            </p>
                        </div>

                        <img class="max-h-72 w-full object-cover mx-auto mt-5 rounded-2xl shadow"
                             src=""
                             id="upload_image_preview">
                    </div>

                    <!-- BUTTONS -->
                    <div class="flex flex-col sm:flex-row gap-4 pt-2">

                        <button type="submit"
                                class="w-full py-3.5 text-sm font-extrabold
                                       text-white bg-indigo-600
                                       rounded-2xl
                                       hover:bg-indigo-700
                                       hover:shadow-lg hover:shadow-indigo-200
                                       transition">
                            Update Profile
                        </button>

                        <button type="reset"
                                class="w-full py-3.5 text-sm font-extrabold
                                       text-slate-700 bg-white
                                       border border-gray-200
                                       rounded-2xl
                                       hover:bg-gray-50
                                       hover:shadow
                                       transition">
                            Reset
                        </button>

                    </div>

                </form>
            </div>

        </div>
    </div>

    <script th:src="@{'/js/admin.js'}"></script>
</div>

</body>
</html>
