<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contact Modal</title>
</head>

<body>
<div th:fragment="modal">

    <!-- Main modal -->
    <div
            id="view_contact_modal"
            tabindex="-1"
            aria-hidden="true"
            class="hidden fixed inset-0 z-50 flex items-center justify-center
                   bg-black/50 backdrop-blur-sm px-4"
    >

        <div class="relative w-full max-w-xl">

            <!-- Modal content -->
            <div class="relative overflow-hidden rounded-3xl bg-white shadow-2xl border border-gray-200">

                <!-- Top Gradient Strip -->
                <div class="h-2 bg-gradient-to-r from-indigo-600 via-blue-600 to-cyan-500"></div>

                <!-- Modal header -->
                <div class="flex items-start justify-between px-6 py-6 border-b border-gray-100">

                    <div class="flex gap-4 items-center">

                        <!-- Picture -->
                        <div class="relative">
                            <img class="w-16 h-16 rounded-2xl object-cover border border-gray-200 shadow"
                                 id="contact_picture"
                                 onerror="this.src='/images/defaultUser.jpg'"
                                 src=""
                                 alt="Contact"/>
                        </div>

                        <!-- Name + Email -->
                        <div>
                            <h3 id="contact_name" class="text-xl font-extrabold text-gray-900 leading-tight">
                                Contact Name
                            </h3>
                            <p id="contact_email" class="text-sm text-gray-500 mt-1">
                                contact@email.com
                            </p>
                        </div>

                    </div>

                    <!-- Close Button -->
                    <button
                            type="button"
                            onclick="closeContactModal()"
                            class="rounded-xl p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition"
                    >
                        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M6 18 18 6M6 6l12 12"/>
                        </svg>
                    </button>

                </div>

                <!-- Modal body -->
                <div class="px-6 py-6">

                    <h4 class="text-sm font-bold text-gray-900 mb-4">
                        Contact Details
                    </h4>

                    <div class="space-y-3">

                        <!-- Phone -->
                        <div class="flex items-center gap-3 rounded-2xl border border-gray-200 bg-gray-50 px-4 py-4">
                            <div class="w-10 h-10 grid place-items-center rounded-xl bg-white border border-gray-200 shadow-sm">
                                <i class="fa-solid fa-phone text-gray-700"></i>
                            </div>

                            <div class="flex-1">
                                <p class="text-xs font-semibold text-gray-500">Phone</p>
                                <p id="contact_number" class="text-sm font-bold text-gray-900 break-words">
                                    +91 98765 43210
                                </p>
                            </div>
                        </div>

                        <!-- Address -->
                        <div class="flex items-center gap-3 rounded-2xl border border-gray-200 bg-gray-50 px-4 py-4">
                            <div class="w-10 h-10 grid place-items-center rounded-xl bg-white border border-gray-200 shadow-sm">
                                <svg class="w-5 h-5 text-gray-700"
                                     aria-hidden="true"
                                     xmlns="http://www.w3.org/2000/svg"
                                     fill="none"
                                     viewBox="0 0 24 24">
                                    <path stroke="currentColor"
                                          stroke-linecap="round"
                                          stroke-linejoin="round"
                                          stroke-width="2"
                                          d="M12 21s-6-5.686-6-10
                                              a6 6 0 1 1 12 0
                                               c0 4.314-6 10-6 10Zm0-7
                                               a3 3 0 1 0 0-6
                                     3 3 0 0 0 0 6Z"/>
                                </svg>
                            </div>

                            <div class="flex-1">
                                <p class="text-xs font-semibold text-gray-500">Address</p>
                                <p id="contact_address" class="text-sm font-bold text-gray-900 break-words">
                                    --
                                </p>
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="flex items-center gap-3 rounded-2xl border border-gray-200 bg-gray-50 px-4 py-4">
                            <div class="w-10 h-10 grid place-items-center rounded-xl bg-white border border-gray-200 shadow-sm">
                                <i class="fa-solid fa-user text-gray-700"></i>
                            </div>

                            <div class="flex-1">
                                <p class="text-xs font-semibold text-gray-500">Description</p>
                                <p id="contact_description" class="text-sm font-bold text-gray-900 break-words">
                                    --
                                </p>
                            </div>
                        </div>

                        <!-- Facebook -->
                        <div class="flex items-center gap-3 rounded-2xl border border-gray-200 bg-gray-50 px-4 py-4">
                            <div class="w-10 h-10 grid place-items-center rounded-xl bg-white border border-gray-200 shadow-sm">
                                <i class="fa-brands fa-facebook text-gray-700"></i>
                            </div>

                            <div class="flex-1">
                                <p class="text-xs font-semibold text-gray-500">Facebook</p>
                                <p id="contact_facebook" class="text-sm font-bold text-gray-900 break-words">
                                    --
                                </p>
                            </div>
                        </div>

                        <!-- LinkedIn -->
                        <div class="flex items-center gap-3 rounded-2xl border border-gray-200 bg-gray-50 px-4 py-4">
                            <div class="w-10 h-10 grid place-items-center rounded-xl bg-white border border-gray-200 shadow-sm">
                                <i class="fa-brands fa-linkedin text-gray-700"></i>
                            </div>

                            <div class="flex-1">
                                <p class="text-xs font-semibold text-gray-500">LinkedIn</p>
                                <p id="contact_linkedin" class="text-sm font-bold text-gray-900 break-words">
                                    --
                                </p>
                            </div>
                        </div>

                    </div>
                </div>

                <!-- Modal footer -->
                <div class="px-6 pb-6">

                    <button
                            type="button"
                            onclick="closeContactModal()"
                            class="w-full py-3.5 rounded-2xl text-sm font-extrabold
                                   bg-gray-900 text-white
                                   hover:bg-black transition shadow-lg shadow-gray-300"
                    >
                        Close
                    </button>

                </div>

            </div>
        </div>
    </div>

</div>
</body>
</html>
