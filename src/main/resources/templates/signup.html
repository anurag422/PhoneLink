<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sign Up | PhoneLink</title>
</head>

<body>

<div layout:fragment="content"
     class="relative min-h-[calc(100vh-4.25rem)] flex items-center justify-center px-4 py-10">

    <!-- Background -->
    <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950"></div>
    <div class="absolute inset-0 opacity-30 bg-[radial-gradient(circle_at_30%_20%,rgba(99,102,241,0.35),transparent_40%),radial-gradient(circle_at_80%_70%,rgba(59,130,246,0.25),transparent_45%)]"></div>

    <!-- Card -->
    <div class="relative w-full max-w-lg">
        <div class="bg-white/10 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-7">

            <!-- Header -->
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-white tracking-tight">
                    Create your account 🚀
                </h1>
                <p class="text-sm text-slate-300 mt-1">
                    Start managing your contacts with <span class="font-semibold text-indigo-300">PhoneLink</span>
                </p>
            </div>

            <form th:action="@{/do-register}"
                  method="post"
                  class="space-y-4"
                  enctype="multipart/form-data"
                  th:object="${userForm}"
                  novalidate>

                <!-- Messages -->
                <div th:replace="~{message :: message}"></div>

                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-slate-200 mb-2" for="username">
                        Username
                    </label>
                    <input type="text"
                           id="username"
                           th:field="*{name}"
                           class="w-full px-4 py-3 text-sm text-white placeholder:text-slate-400
                                  bg-white/5 border border-white/10 rounded-xl
                                  focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
                                  outline-none transition"
                           placeholder="Username"
                           required>

                    <p th:if="${#fields.hasErrors('name')}"
                       th:errors="*{name}"
                       class="text-red-300 px-1 pt-2 text-sm"></p>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-slate-200 mb-2" for="email">
                        Email
                    </label>
                    <input type="email"
                           id="email"
                           th:field="*{email}"
                           class="w-full px-4 py-3 text-sm text-white placeholder:text-slate-400
                                  bg-white/5 border border-white/10 rounded-xl
                                  focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
                                  outline-none transition"
                           placeholder="Email"
                           required>

                    <p th:if="${#fields.hasErrors('email')}"
                       th:errors="*{email}"
                       class="text-red-300 px-1 pt-2 text-sm"></p>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-slate-200 mb-2" for="password">
                        Password
                    </label>
                    <input type="password"
                           id="password"
                           th:field="*{password}"
                           class="w-full px-4 py-3 text-sm text-white placeholder:text-slate-400
                                  bg-white/5 border border-white/10 rounded-xl
                                  focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
                                  outline-none transition"
                           placeholder="••••••••"
                           required>

                    <p th:if="${#fields.hasErrors('password')}"
                       th:errors="*{password}"
                       class="text-red-300 px-1 pt-2 text-sm"></p>
                </div>

                <!-- Phone -->
                <div>
                    <label class="block text-sm font-medium text-slate-200 mb-2" for="phone">
                        Contact Number
                    </label>
                    <input type="text"
                           id="phone"
                           th:field="*{phoneNumber}"
                           class="w-full px-4 py-3 text-sm text-white placeholder:text-slate-400
                                  bg-white/5 border border-white/10 rounded-xl
                                  focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
                                  outline-none transition"
                           placeholder="Phone NO"
                           required>

                    <p th:if="${#fields.hasErrors('phoneNumber')}"
                       th:errors="*{phoneNumber}"
                       class="text-red-300 px-1 pt-2 text-sm"></p>
                </div>

                <!-- About -->
                <div>
                    <label for="message" class="block text-sm font-medium text-slate-200 mb-2">
                        About
                    </label>

                    <textarea id="message" rows="4"
                              th:field="*{about}"
                              class="w-full px-4 py-3 text-sm text-white placeholder:text-slate-400
                                     bg-white/5 border border-white/10 rounded-xl
                                     resize-none
                                     focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
                                     outline-none transition"
                              placeholder="Write something about yourself..."></textarea>

                    <p th:if="${#fields.hasErrors('about')}"
                       th:errors="*{about}"
                       class="text-red-300 px-1 pt-2 text-sm"></p>
                </div>

                <!-- Upload -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-slate-200">
                        Profile Image
                    </label>

                    <input id="input_file"
                           th:field="*{profileImage}"
                           type="file"
                           class="block w-full cursor-pointer text-sm text-slate-200
                                  file:mr-4 file:py-2 file:px-4
                                  file:rounded-xl file:border-0
                                  file:bg-indigo-600 file:text-white file:font-semibold
                                  hover:file:bg-indigo-700
                                  bg-white/5 border border-white/10 rounded-xl
                                  focus:outline-none focus:ring-2 focus:ring-indigo-500"/>

                    <p class="text-xs text-slate-400">
                        JPG, PNG recommended. Max size depends on server.
                    </p>

                    <img class="hidden max-h-64 w-full object-cover mx-auto mt-3 rounded-xl border border-white/10"
                         src=""
                         id="upload_image_preview">
                </div>

                <!-- Buttons -->
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button type="submit"
                            class="w-full py-3 text-sm font-semibold
                                   text-white bg-indigo-600 rounded-xl
                                   hover:bg-indigo-700
                                   focus:ring-4 focus:ring-indigo-300/30
                                   transition">
                        Create Account
                    </button>

                    <button type="reset"
                            class="w-full py-3 text-sm font-semibold
                                   text-slate-200 bg-white/10 rounded-xl
                                   hover:bg-white/20
                                   focus:ring-4 focus:ring-white/10
                                   transition">
                        Reset
                    </button>
                </div>

                <!-- Footer -->
                <p class="text-sm text-center text-slate-300 pt-2">
                    Already have an account?
                    <a th:href="@{/login}"
                       class="text-indigo-300 font-semibold hover:text-indigo-200 underline underline-offset-4">
                        Login
                    </a>
                </p>

            </form>

        </div>
    </div>

    <script th:src="@{'/js/admin.js'}"></script>

</div>

</body>
</html>
